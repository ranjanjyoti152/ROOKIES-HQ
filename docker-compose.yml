services:
  postgres:
    image: postgres:16-alpine
    container_name: rookishq-db
    environment:
      POSTGRES_DB: rookishq
      POSTGRES_USER: rookishq
      POSTGRES_PASSWORD: rookishq_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rookishq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rookishq-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  db-migrations:
    image: python:3.12-slim
    container_name: rookishq-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://rookishq:rookishq_secret@postgres:5432/rookishq
    command: /bin/sh -c "pip install --no-cache-dir -r requirements.txt && alembic upgrade head"

volumes:
  pgdata:
  redisdata:
